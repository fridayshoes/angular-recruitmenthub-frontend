<p>register works!</p>

<form (ngSubmit)="submitData()">
  <label>Name</label>
  <input type="text" [(ngModel)]="trainer.name" name="name" />

  <label>Contact</label>
  <input type="text" [(ngModel)]="trainer.contact" name="contact" />

  <label>Address</label>
  <input type="text" [(ngModel)]="trainer.address" name="address" />

  <label>Tech Stack</label>
  <input type="text" [(ngModel)]="trainer.tech_stack" name="tech_stack" />

  <label>Experience</label>
  <input type="number" [(ngModel)]="trainer.total_experience" name="total_experience" />

  <button type="submit">Register Trainer</button>
</form>
